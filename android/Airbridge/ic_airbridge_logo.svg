<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Gradient for circle ring -->
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5545"/>
      <stop offset="100%" stop-color="#723F30"/>
    </linearGradient>
    <!-- Gradient for top arrow (primary terracotta) -->
    <linearGradient id="arrowTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B5545"/>
      <stop offset="100%" stop-color="#654348"/>
    </linearGradient>
    <!-- Gradient for bottom arrow (light terracotta/rose) -->
    <linearGradient id="arrowBot" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#DDB5A5"/>
      <stop offset="100%" stop-color="#D5B8BD"/>
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#2C1510" flood-opacity="0.25"/>
    </filter>
    <!-- Inner glow for circle -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#F2DDD4" flood-opacity="0.4"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer circle with gradient and shadow -->
  <circle cx="256" cy="256" r="216" stroke="url(#ringGrad)" stroke-width="36" fill="none" filter="url(#shadow)"/>

  <!-- Subtle inner circle highlight -->
  <circle cx="256" cy="256" r="196" stroke="#F2DDD4" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Top sync arrow (dark terracotta → rose) with glow -->
  <g filter="url(#glow)">
    <path d="M165 210 A120 120 0 0 1 347 210" stroke="url(#arrowTop)" stroke-width="30" stroke-linecap="round" fill="none"/>
    <path d="M322 170 L350 212 L308 224" stroke="url(#arrowTop)" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Bottom sync arrow (light terracotta → sage) with glow -->
  <g filter="url(#glow)">
    <path d="M347 302 A120 120 0 0 1 165 302" stroke="url(#arrowBot)" stroke-width="30" stroke-linecap="round" fill="none"/>
    <path d="M190 342 L162 300 L204 288" stroke="url(#arrowBot)" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
